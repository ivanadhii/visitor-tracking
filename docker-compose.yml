services:
  backend:
    build: ./backend
    networks: [internal]
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - yolo_cache:/root/.config/Ultralytics
      - ./backend/bytetrack.yaml:/app/bytetrack.yaml
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/streams"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    networks: [internal]
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    networks: [internal]
    restart: unless-stopped
    depends_on:
      - backend
      - frontend

networks:
  internal:
    driver: bridge

volumes:
  yolo_cache:
